<div class="bg-gray-50 rounded-xl p-4 text-sm text-gray-700">
  <p class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-2">Q. {{ user_question }}</p>
  <p class="leading-relaxed whitespace-pre-wrap">{{ answer }}</p>

  <!-- 추가 질문 폼 -->
  <form
    hx-post="/quiz/{{ question_id }}/ask"
    hx-target="#followup-area"
    hx-swap="innerHTML"
    class="mt-4 flex flex-col sm:flex-row gap-2"
  >
    <input
      type="text" name="user_question"
      placeholder="추가 질문..."
      class="flex-1 text-sm border border-gray-200 rounded-xl px-4 py-2.5 focus:outline-none focus:border-orange-400 focus:ring-1 focus:ring-orange-200 bg-white"
    >
    <button type="submit"
            class="bg-gray-200 text-gray-600 px-4 py-2.5 rounded-xl text-sm font-medium hover:bg-gray-300 transition-colors">
      질문
    </button>
  </form>
</div>
