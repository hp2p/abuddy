<div class="bg-blue-50 rounded-xl p-4 text-sm text-gray-700">
  <p class="text-xs text-blue-400 font-medium mb-1">Q. {{ user_question }}</p>
  <p class="whitespace-pre-wrap leading-relaxed">{{ answer }}</p>

  <!-- 추가 질문 폼 (같은 자리 교체) -->
  <form
    hx-post="/quiz/{{ question_id }}/ask"
    hx-target="#followup-area"
    hx-swap="innerHTML"
    class="mt-3 flex gap-2"
  >
    <input
      type="text" name="user_question"
      placeholder="추가 질문..."
      class="flex-1 text-sm border border-blue-200 rounded-xl px-3 py-2 focus:outline-none focus:border-blue-400 bg-white"
    >
    <button type="submit"
            class="bg-blue-100 text-blue-600 px-4 py-2 rounded-xl text-sm hover:bg-blue-200 transition-colors">
      질문
    </button>
  </form>
</div>
